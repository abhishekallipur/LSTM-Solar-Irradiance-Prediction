name: Auto Train Model

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - run: python train.py
