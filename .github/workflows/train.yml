name: Auto Train Model

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v5

      - run: python --version

      - run: python -m pip install -r requirements.txt

      - run: python train.py
